<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Social X WhatsApp - Muller Edition</title>
    <style>
        :root {
            --bg-principal: #0b1426;       
            --bg-secondaire: #13223c;     
            --bg-hover: #1e3257;
            --texte-principal: #f8fafc;
            --texte-secondaire: #94a3b8;
            --or-accent: #f59e0b;         
            --bleu-action: #38bdf8;
            --bordure: #1e293b;
            --vert-light: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-principal); color: var(--texte-principal); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        header { 
            background-color: var(--bg-secondaire); 
            padding: 0 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--bordure); 
            height: 56px; 
            flex-shrink: 0; 
        }
        .logo-zone { font-weight: 600; font-size: 18px; color: var(--or-accent); }
        
        .conteneur-principal { display: flex; flex: 1; height: calc(100vh - 56px); overflow: hidden; }
        
        .colonne-gauche { 
            width: 260px; 
            background-color: var(--bg-secondaire); 
            border-right: 1px solid var(--bordure); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .menu-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 12px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s; 
            margin-bottom: 6px; 
            font-size: 14px; 
            color: var(--texte-secondaire); 
        }
        .menu-item:hover, .menu-item.actif { background-color: var(--bg-hover); color: var(--texte-principal); }
        .menu-item.actif { border-left: 3px solid var(--or-accent); }

        .zone-centrale { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 800px; }
        
        .loader { color: var(--texte-secondaire); font-size: 14px; text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-zone">📐 G-Social Platform <small style="font-size: 11px; color: var(--texte-secondaire);">Müller Edition</small></div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span style="width: 8px; height: 8px; background-color: var(--vert-light); border-radius: 50%;"></span>
            <span id="app-status" style="font-size: 12px; color: var(--texte-secondaire);">Initialisation...</span>
        </div>
    </header>

    <div class="conteneur-principal">
        
        <aside class="colonne-gauche">
            <nav style="flex: 1;">
                <div class="menu-item actif" onclick="chargerComposant('social.html', this)">🏠 Fil Social</div>
                <div class="menu-item" onclick="chargerComposant('chat.html', this)">💬 Messagerie Chat</div>
            </nav>
        </aside>

        <main class="zone-centrale">
            <div class="app-container" id="zone-injection">
                <div class="loader">Chargement du composant...</div>
            </div>
        </main>

    </div>

    <script src="./config.js"></script>
    <script>
        // Affichage du statut depuis le fichier de config
        if (typeof CONFIG !== 'undefined') {
            document.getElementById('app-status').innerText = `Version ${CONFIG.version} - ${CONFIG.env}`;
        }

        // Routeur pour aller chercher les fichiers HTML du fork
        async function chargerComposant(nomFichier, elementMenu) {
            if (elementMenu) {
                document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('actif'));
                elementMenu.classList.add('actif');
            }

            const conteneur = document.getElementById('zone-injection');
            conteneur.innerHTML = '<div class="loader">Connexion au fork...</div>';

            try {
                const reponse = await fetch(`./${nomFichier}`);
                if (!reponse.ok) throw new Error("Fichier introuvable");
                const html = await reponse.text();
                
                // Injecte le fichier HTML cible
                conteneur.innerHTML = html;
            } catch (error) {
                conteneur.innerHTML = `
                    <div style="background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #ef4444;">
                        <h4 style="color: #ef4444;">Erreur de chargement</h4>
                        <p style="font-size: 13px; color: var(--texte-secondaire); margin-top: 8px;">
                            Le fichier <strong>${nomFichier}</strong> est introuvable ou le navigateur bloque l'accès local. 
                            Utilise un serveur local (Live Server) pour exécuter l'application.
                        </p>
                    </div>`;
            }
        }

        // Charger le premier fichier par défaut
        window.addEventListener('DOMContentLoaded', () => {
            chargerComposant('social.html', document.querySelector('.menu-item.actif'));
        });
    </script>
</body>
</html>
