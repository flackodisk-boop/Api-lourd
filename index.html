<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot - Assistant IA</title>
    <style>
        :root {
            --bg-principal: #212121;
            --bg-chat: #171717;
            --bg-input: #2f2f2f;
            --texte: #ececec;
            --texte-secondaire: #b4b4b4;
            --accent: #10a37f; 
            --accent-hover: #1a7f64;
            --bulle-user: #2f2f2f;
            --bordure: #424242;
            --bleu-action: #3b82f6;
            --bleu-hover: #2563eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: var(--bg-principal);
            color: var(--texte);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Écran de démarrage (Splash Screen) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .logo-animation {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 20px rgba(16, 163, 127, 0.4);
            animation: pulse 2s infinite ease-in-out;
        }

        .splash-title {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 600;
            color: var(--texte);
            letter-spacing: 1px;
        }

        .splash-subtitle {
            margin-top: 8px;
            font-size: 13px;
            color: var(--texte-secondaire);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 163, 127, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(16, 163, 127, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 163, 127, 0); }
        }

        /* Interface Principale */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid var(--bordure);
            border-right: 1px solid var(--bordure);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .header {
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid var(--bordure);
            color: var(--texte-secondaire);
            background: var(--bg-chat);
            flex-shrink: 0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
        }

        .row {
            width: 100%;
            padding: 14px 24px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .row.user-row {
            justify-content: flex-end;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .ai-row .avatar {
            background: var(--accent);
            color: white;
        }

        .bubble {
            max-width: 85%;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-row .bubble {
            background: var(--bulle-user);
            padding: 10px 16px;
            border-radius: 20px;
        }

        .ai-row .bubble {
            padding-top: 4px;
            color: var(--texte);
        }

        .media-preview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            margin-top: 12px;
            border: 1px solid var(--bordure);
            display: block;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            max-width: 300px;
        }

        .btn-action {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .btn-download { background: var(--accent); }
        .btn-download:hover { background: var(--accent-hover); }
        .btn-view { background: var(--bleu-action); }
        .btn-view:hover { background: var(--bleu-hover); }

        .input-area {
            padding: 0 24px 24px 24px;
            background: var(--bg-chat);
            flex-shrink: 0;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
            background: var(--bg-input);
            border-radius: 24px;
            border: 1px solid var(--bordure);
            display: flex;
            align-items: center;
            padding: 6px 12px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--texte);
            padding: 10px 12px;
            font-size: 15px;
        }

        input::placeholder {
            color: var(--texte-secondaire);
        }

        .btn-send {
            width: 32px;
            height: 32px;
            background: var(--texte);
            color: var(--bg-chat);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-send:hover { background: var(--texte-secondaire); }
        .btn-send:active { transform: scale(0.95); }

        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--texte-secondaire);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .messages::-webkit-scrollbar { width: 8px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-animation">C</div>
        <div class="splash-title">Copilot v1</div>
        <div class="splash-subtitle">Par Célestin Olua</div>
    </div>

    <div class="chat-container" id="app-container">
        <div class="header">
            Copilot v1 — Par Célestin Olua
        </div>

        <div id="messages" class="messages">
            <div class="row ai-row">
                <div class="avatar">C</div>
                <div class="bubble">Bonjour ! Je suis Copilot. Posez-moi une question ou demandez-moi une image (ex: "génère une image de voiture futuriste").</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="input" placeholder="Message Copilot ou prompt d'image...">
                <button class="btn-send" id="sendBtn" onclick="send()">↑</button>
            </div>
        </div>
    </div>

    <script>
        const API_COPILOT = "https://celestin-api.onrender.com/api/v1/copilot";
        const API_IMAGE = "https://christus-gem-api.onrender.com/generate";
        
        const messagesContainer = document.getElementById("messages");
        const inputField = document.getElementById("input");

        // Gestion du Logo d'ouverture (Splash Screen)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const app = document.getElementById('app-container');
                
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.1)';
                app.style.opacity = '1';
                
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 500);
            }, 2500); // Reste visible 2.5 secondes au lancement
        });

        function viewImage(url) {
            window.open(url, '_blank');
        }

        async function downloadImage(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = blobUrl;
                a.download = `generation_${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch (err) {
                console.error("Erreur de téléchargement", err);
            }
        }

        function addMessage(text, sender, imageUrl = null) {
            const row = document.createElement("div");
            row.className = `row ${sender}-row`;

            if (sender === "ai") {
                let htmlContent = `
                    <div class="avatar">C</div>
                    <div class="bubble">
                        <div>${text}</div>`;
                
                if (imageUrl) {
                    htmlContent += `
                        <img src="${imageUrl}" class="media-preview" alt="Création">
                        <div class="button-group">
                            <button class="btn-action btn-download" onclick="downloadImage('${imageUrl}')">⬇️ Télécharger</button>
                            <button class="btn-action btn-view" onclick="viewImage('${imageUrl}')">👁️ Voir</button>
                        </div>`;
                }
                
                htmlContent += `</div>`;
                row.innerHTML = htmlContent;
            } else {
                row.innerHTML = `<div class="bubble">${text}</div>`;
            }

            messagesContainer.appendChild(row);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addLoading() {
            const row = document.createElement("div");
            row.className = "row ai-row";
            row.innerHTML = `
                <div class="avatar">C</div>
                <div class="bubble">
                    <div class="loading-dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>`;
            messagesContainer.appendChild(row);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return row;
        }

        function isImageRequest(text) {
            const keys = ['génère', 'genere', 'crée', 'cree', 'dessine', 'imagine', 'photo', 'image', 'generate', 'create'];
            return keys.some(k => text.toLowerCase().includes(k));
        }

        function cleanPrompt(text) {
            return text.replace(/^(génère|genere|crée|cree|dessine|imagine|veux|affiche)\s+(une image de|une photo de|un|une)?/i, '').trim();
        }

        async function send() {
            const text = inputField.value.trim();
            if (!text) return;

            addMessage(text, "user");
            inputField.value = "";

            const loader = addLoading();

            try {
                if (isImageRequest(text)) {
                    const finalPrompt = cleanPrompt(text);
                    
                    const response = await fetch(API_IMAGE, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt: finalPrompt, ratio: "1:1", format: "jpg" })
                    });

                    if (!response.ok) throw new Error("Erreur de génération d'image");
                    
                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);
                    
                    loader.remove();
                    addMessage(`🎨 Voici la génération pour : "${finalPrompt}"`, "ai", imageUrl);
                } 
                else {
                    const response = await fetch(API_COPILOT, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt: text })
                    });

                    if (!response.ok) throw new Error("Erreur réponse Copilot");

                    const data = await response.json();
                    loader.remove();

                    const reply = data.reply || data.response || data.choices?.[0]?.message?.content || "Analyse effectuée.";
                    addMessage(reply, "ai");
                }

            } catch (error) {
                loader.remove();
                addMessage(`❌ Une erreur est survenue : ${error.message}`, "ai");
            }
        }

        inputField.addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
