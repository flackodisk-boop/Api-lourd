<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Néo — Assistant IA</title>
    <style>
        :root {
            --bg-principal: #0a0a0a;
            --bg-chat: #121212;
            --bg-input: #1a1a1a;
            --texte: #f4f4f5;
            --texte-secondaire: #a1a1aa;
            --accent: #10b981; 
            --accent-hover: #059669;
            --bulle-user: #27272a;
            --bordure: #202023;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-principal);
            color: var(--texte);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-principal);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
        }

        .pyramid-logo {
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid var(--accent);
            position: absolute;
        }

        .tree-icon {
            position: absolute;
            font-size: 28px;
            bottom: 5px;
            z-index: 2;
        }

        .splash-title {
            font-size: 32px;
            font-weight: 700;
        }

        .splash-subtitle {
            margin-top: 8px;
            font-size: 14px;
            color: var(--texte-secondaire);
            text-transform: uppercase;
        }

        .chat-container {
            width: 100%;
            max-width: 680px;
            height: 100vh;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid var(--bordure);
            border-right: 1px solid var(--bordure);
        }

        .header {
            padding: 16px 24px;
            font-size: 14px;
            border-bottom: 1px solid var(--bordure);
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid var(--accent);
        }

        .header-title {
            font-weight: 600;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
        }

        .row {
            width: 100%;
            padding: 12px 24px;
            display: flex;
            gap: 16px;
        }

        .row.user-row { justify-content: flex-end; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            background: var(--accent);
            color: white;
        }

        .bubble {
            max-width: 82%;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .user-row .bubble { 
            background: var(--bulle-user); 
            padding: 12px 18px; 
            border-radius: 18px;
            border: 1px solid var(--bordure);
        }
        .ai-row .bubble { padding-top: 4px; }

        .media-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 12px;
            border: 1px solid var(--bordure);
        }

        .input-area {
            padding: 0 24px 24px 24px;
            background: var(--bg-chat);
        }

        .input-wrapper {
            background: var(--bg-input);
            border-radius: 16px;
            border: 1px solid var(--bordure);
            display: flex;
            align-items: flex-end; 
            padding: 8px 12px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--texte);
            padding: 8px; 
            font-size: 15px;
            resize: none;
            height: 36px; 
            max-height: 160px;
        }

        .btn-send {
            width: 36px;
            height: 36px;
            background: var(--texte);
            color: var(--bg-chat);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn-send:hover { background: var(--accent); color: white; }

        .loading-dots { display: flex; gap: 5px; padding: 12px 4px; }
        .dot {
            width: 7px;
            height: 7px;
            background: var(--texte-secondaire);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container">
            <div class="pyramid-logo"></div>
            <div class="tree-icon">🌳</div>
        </div>
        <div class="splash-title">Néo</div>
        <div class="splash-subtitle">Par Célestin Olua</div>
    </div>

    <div class="chat-container">
        <div class="header">
            <div class="header-left">
                <div class="header-logo"></div>
                <span class="header-title">Néo v1</span>
            </div>
        </div>

        <div id="messages" class="messages">
            <div class="row ai-row">
                <div class="avatar">N</div>
                <div class="bubble">Bonjour. Je suis Néo, votre assistant IA conçu par Célestin Olua. Posez-moi une question ou demandez-moi une image !</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="input" placeholder="Discutez ou générez une image..."></textarea>
                <button class="btn-send" onclick="send()">↑</button>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById("messages");
        const inputField = document.getElementById("input");

        // Utilisation d'un proxy CORS public pour forcer l'accès si le navigateur bloque en local
        const PROXY = "https://cors-anywhere.herokuapp.com/"; 
        const API_TEXT = "https://christus-api.vercel.app/ai/Llamachat";
        const API_IMAGE = "https://christus-api.vercel.app/image/animagine";

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
            }, 1500);
        });

        function addMessage(text, sender, imageUrl = null) {
            const row = document.createElement("div");
            row.className = `row ${sender}-row`;
            row.innerHTML = sender === "ai" 
                ? `<div class="avatar">N</div><div class="bubble"><div>${text}</div>${imageUrl ? `<img src="${imageUrl}" class="media-preview">` : ''}</div>`
                : `<div class="bubble"><div>${text}</div></div>`;
            messagesContainer.appendChild(row);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addLoading() {
            const row = document.createElement("div");
            row.className = "row ai-row";
            row.innerHTML = `<div class="avatar">N</div><div class="bubble"><div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            messagesContainer.appendChild(row);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return row;
        }

        function isImageRequest(text) {
            const keys = ['génère', 'genere', 'crée', 'cree', 'dessine', 'imagine', 'photo', 'image'];
            return keys.some(k => text.toLowerCase().includes(k));
        }

        async function send() {
            const text = inputField.value.trim();
            if (!text) return;

            addMessage(text, "user");
            inputField.value = "";
            const loader = addLoading();

            try {
                if (isImageRequest(text)) {
                    // Pour l'image, on pointe directement vers l'URL brute (le navigateur l'affiche sans problème dans une balise <img>)
                    const targetUrl = `${API_IMAGE}?prompt=${encodeURIComponent(text)}`;
                    loader.remove();
                    addMessage(`Voici votre image pour : "${text}"`, "ai", targetUrl);
                } 
                else {
                    const fullPrompt = `Tu es l'IA Néo, créée uniquement par ton créateur Célestin Olua. Réponds à ceci : ${text}`;
                    
                    // On tente d'abord l'appel direct
                    let response;
                    try {
                        response = await fetch(`${API_TEXT}?text=${encodeURIComponent(fullPrompt)}`);
                    } catch(e) {
                        // Secours si blocage CORS local : on utilise le proxy
                        response = await fetch(`${PROXY}${API_TEXT}?text=${encodeURIComponent(fullPrompt)}`);
                    }

                    if (!response.ok) throw new Error("Impossible d'obtenir une réponse de l'API.");

                    let reply = await response.text();
                    
                    // Nettoyage si format JSON encapsulé
                    try {
                        const parsed = JSON.parse(reply);
                        reply = parsed.response || parsed.result || parsed.message || reply;
                    } catch(e) {}

                    loader.remove();
                    addMessage(reply, "ai");
                }
            } catch (error) {
                loader.remove();
                addMessage("Je rencontre une petite difficulté de connexion avec l'API. Réessaye dans un instant !", "ai");
            }
        }

        inputField.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
    </script>
</body>
</html>
